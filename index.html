/** Create a weapon mesh and return it */
function createWeaponMesh(type, rarity) {
  const group = new THREE.Group();
  const rc = CFG.rarityColors[rarity] || CFG.rarityColors.common;
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.7 });
  const rarityMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(rc), roughness: 0.3, metalness: 0.6, emissive: new THREE.Color(rc), emissiveIntensity: 0.15 });

  switch (type) {
    case 'pistol': {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.14, 0.25), baseMat);
      group.add(body);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.15, 8), baseMat);
      barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.05, -0.18);
      group.add(barrel);
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.06), rarityMat);
      grip.position.set(0, -0.1, 0.04); grip.rotation.x = 0.2;
      group.add(grip);
      break;
    }
    case 'ar': {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.55), baseMat);
      group.add(body);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.25, 8), baseMat);
      barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.03, -0.38);
      group.add(barrel);
      const mag = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.14, 0.06), rarityMat);
      mag.position.set(0, -0.1, 0.05);
      group.add(mag);
      const stock = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.08, 0.15), baseMat);
      stock.position.set(0, 0, 0.32);
      group.add(stock);
      break;
    }
    case 'shotgun': {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), baseMat);
      group.add(body);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.25, 8), baseMat);
      barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.03, -0.3);
      group.add(barrel);
      const pump = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 0.1), rarityMat);
      pump.position.set(0, -0.03, -0.1);
      group.add(pump);
      break;
    }
    case 'sniper': {
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.1, 0.7), baseMat);
      group.add(body);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.35, 8), baseMat);
      barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.03, -0.5);
      group.add(barrel);
      const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.15, 8), rarityMat);
      scope.position.set(0, 0.09, -0.05);
      group.add(scope);
      const stock = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.07, 0.2), baseMat);
      stock.position.set(0, -0.01, 0.4);
      group.add(stock);
      break;
    }
    case 'rocket': {
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.5, 8), baseMat);
      body.rotation.x = Math.PI / 2;
      group.add(body);
      const funnel = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.04, 0.08, 8), rarityMat);
      funnel.rotation.x = Math.PI / 2; funnel.position.z = -0.28;
      group.add(funnel);
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.05), baseMat);
      grip.position.set(0, -0.08, 0.05);
      group.add(grip);
      break;
    }
  }

  return group;
}

// ═══════════════════════════════════════════════════════════════════
// WEAPON INSTANCE — wraps stats, ammo, fire control
// ═══════════════════════════════════════════════════════════════════

class WeaponInstance {
  constructor(type, rarity) {
    this.type = type;
    this.rarity = rarity;
    const base = CFG.weaponStats[type];

    // Apply rarity modifiers
    this.name = base.name;
    this.damage = base.damage * (CFG.rarityDmgMul[rarity] || 1);
    this.fireRate = base.fireRate;
    this.reloadTime = base.reloadTime * (CFG.rarityReloadMul[rarity] || 1);
    this.magSize = base.magSize;
    this.spread = base.spread * (CFG.raritySpreadMul[rarity] || 1);
    this.ammoType = base.ammoType;
    this.range = base.range;
    this.auto = base.auto || false;
    this.pellets = base.pellets || 1;
    this.aoe = base.aoe || 0;

    this.currentAmmo = this.magSize;
    this.reserveAmmo = this.magSize * 4;
    this.fireCooldown = 0;
    this.isReloading = false;
    this.reloadTimer = 0;

    this.mesh = createWeaponMesh(type, rarity);
  }

  /** Can we fire right now? */
  canFire() {
    return !this.isReloading && this.currentAmmo > 0 && this.fireCooldown <= 0;
  }

  /** Fire — returns true if shot was taken */
  fire() {
    if (!this.canFire()) return false;
    this.currentAmmo--;
    this.fireCooldown = this.fireRate / 1000;
    return true;
  }

  /** Start reload */
  startReload() {
    if (this.isReloading || this.currentAmmo === this.magSize || this.reserveAmmo <= 0) return;
    this.isReloading = true;
    this.reloadTimer = this.reloadTime / 1000;
  }

  /** Update reload timer */
  updateReload(dt) {
    if (!this.isReloading) return;
    this.reloadTimer -= dt;
    if (this.reloadTimer <= 0) {
      const needed = this.magSize - this.currentAmmo;
      const available = Math.min(needed, this.reserveAmmo);
      this.currentAmmo += available;
      this.reserveAmmo -= available;
      this.isReloading = false;
    }
  }

  /** Update fire cooldown */
  updateCooldown(dt) {
    if (this.fireCooldown > 0) this.fireCooldown -= dt;
  }
}

// ═══════════════════════════════════════════════════════════════════
// PLAYER CLASS — Extends Humanoid with game logic
// ═══════════════════════════════════════════════════════════════════

class Player extends Humanoid {
  constructor(id, teamColor, startPos, isAI = false) {
    super(teamColor, isAI);
    this.id = id;
    this.hp = CFG.maxHP;
    this.shield = 0;
    this.alive = true;
    this.kills = 0;
    this.deaths = 0;
    this.damageDealt = 0;
    this.lootCollected = 0;
    this.respawnTimer = 0;

    // Position
    this.group.position.copy(startPos);
    this.group.position.y = getTerrainHeight(startPos.x, startPos.z) + 0.1;

    // Velocity / movement
    this.velocity = new THREE.Vector3();
    this.verticalVel = 0;
    this.grounded = true;

    // Weapons (5 slots)
    this.weapons = [null, null, null, null, null];
    this.activeSlot = 0;
    this.materials = { wood: 30, stone: 20, metal: 10 };

    // Shield regen
    this.shieldRegenTimer = 0;

    // Drop / glide state
    this.isDropping = false;
    this.isGliding = false;
    this.gliderMesh = null;

    // AI state
    if (isAI) {
      this.aiTarget = null;
      this.aiReactionTimer = 0;
      this.aiState = 'wander';
      this.aiStateTimer = 0;
      this.aiStrafeDir = 1;
      this.aiWanderTarget = new THREE.Vector3(
        (Math.random() - 0.5) * CFG.mapSize * 0.8,
        0,
        (Math.random() - 0.5) * CFG.mapSize * 0.8
      );
      this.aiShootTimer = 0;
      this.aiBuildTimer = 0;
    }

    // Equip starting pistol
    this.weapons[0] = new WeaponInstance('pistol', 'common');
    this.equipWeapon(0);
  }

  /** Get the currently active weapon */
  getWeapon() { return this.weapons[this.activeSlot]; }

  /** Equip weapon at slot index */
  equipWeapon(slot) {
    if (slot < 0 || slot > 4 || !this.weapons[slot]) return;
    // Remove current weapon mesh from attach point
    const attach = this.weaponAttach;
    while (attach.children.length) attach.remove(attach.children[0]);

    this.activeSlot = slot;
    const w = this.weapons[slot];
    if (w && w.mesh) {
      const clone = w.mesh.clone();
      attach.add(clone);
    }
  }

  /** Pick up a weapon, put in first empty slot or replace current */
  pickupWeapon(weaponInstance) {
    // Find empty slot
    for (let i = 0; i < 5; i++) {
      if (!this.weapons[i]) {
        this.weapons[i] = weaponInstance;
        this.equipWeapon(i);
        return true;
      }
    }
    // Replace current slot
    this.weapons[this.activeSlot] = weaponInstance;
    this.equipWeapon(this.activeSlot);
    return true;
  }

  /** Take damage — shield absorbs first */
  takeDamage(amount, attacker) {
    if (!this.alive) return;
    this.shieldRegenTimer = CFG.shieldRegenDelay;

    // Shield absorbs first
    if (this.shield > 0) {
      const shieldDmg = Math.min(this.shield, amount);
      this.shield -= shieldDmg;
      amount -= shieldDmg;
    }
    this.hp -= amount;
    if (attacker) attacker.damageDealt += amount + (this.shield > 0 ? 0 : 0);

    if (this.hp <= 0) {
      this.hp = 0;
      this.die(attacker);
    }
  }

  die(killer) {
    this.alive = false;
    this.deaths++;
    this.group.visible = false;
    if (killer) {
      killer.kills++;
      addKillFeed(killer.id, this.id);
      if (!killer.isAI && localUser) {
        localUser.coins += CFG.killCoins;
        API.updateCoins(localUser.id, CFG.killCoins);
        saveLocal();
      }
    }
    if (!this.isAI && localUser) {
      localUser.coins = Math.max(0, localUser.coins + CFG.deathCoins);
      API.updateCoins(localUser.id, CFG.deathCoins);
      saveLocal();
    }
    // Check victory
    const aliveCount = players.filter(p => p.alive).length;
    if (aliveCount <= 1) {
      const winner = players.find(p => p.alive);
      if (winner) endMatch(winner);
    }
  }

  respawn() {
    this.alive = true;
    this.hp = CFG.maxHP;
    this.shield = 0;
    this.group.visible = true;
    const S = CFG.mapSize * 0.4;
    this.group.position.set((Math.random()-0.5)*S, 0, (Math.random()-0.5)*S);
    this.group.position.y = getTerrainHeight(this.group.position.x, this.group.position.z) + 0.1;
  }

  /** Update per frame */
  update(dt) {
    if (!this.alive) {
      if (this.respawnTimer > 0) { this.respawnTimer -= dt; if (this.respawnTimer <= 0) this.respawn(); }
      return;
    }

    // Weapon cooldown/reload
    const w = this.getWeapon();
    if (w) { w.updateCooldown(dt); w.updateReload(dt); }

    // Shield regen
    if (this.shield < CFG.maxShield) {
      this.shieldRegenTimer -= dt;
      if (this.shieldRegenTimer <= 0) {
        this.shield = Math.min(CFG.maxShield, this.shield + CFG.shieldRegenRate * dt);
      }
    }

    // Gravity
    if (!this.grounded && !this.isGliding) {
      this.verticalVel -= CFG.gravity * dt;
    } else if (this.isGliding) {
      this.verticalVel = -CFG.gliderDescent;
    }

    // Apply vertical velocity
    this.group.position.y += this.verticalVel * dt;

    // Ground check
    const groundY = getTerrainHeight(this.group.position.x, this.group.position.z) + 0.1;
    if (this.group.position.y <= groundY) {
      this.group.position.y = groundY;
      this.verticalVel = 0;
      this.grounded = true;
      if (this.isGliding) {
        this.isGliding = false;
        if (this.gliderMesh) { this.group.remove(this.gliderMesh); this.gliderMesh = null; }
        this.setAnim(animStates.IDLE);
      }
    } else {
      this.grounded = false;
    }

    // Move
    this.group.position.addScaledVector(this.velocity, dt);
    this.velocity.multiplyScalar(0.85);

    // Clamp to map
    const half = CFG.mapSize / 2 - 2;
    this.group.position.x = Math.max(-half, Math.min(half, this.group.position.x));
    this.group.position.z = Math.max(-half, Math.min(half, this.group.position.z));

    // Animation
    this.updateAnim(dt);
  }

  /** Jump */
  jump() {
    if (!this.grounded || this.isGliding) return;
    this.verticalVel = CFG.jumpForce;
    this.grounded = false;
    this.setAnim(animStates.JUMP);
  }

  /** Shoot the current weapon */
  shoot(targetWorldPos) {
    const w = this.getWeapon();
    if (!w || !w.canFire()) return false;

    if (w.fire()) {
      this.triggerRecoil();
      const origin = this.group.position.clone();
      origin.y += 1.5;

      const pellets = w.pellets || 1;
      for (let p = 0; p < pellets; p++) {
        const dir = targetWorldPos.clone().sub(origin).normalize();
        // Apply spread
        dir.x += (Math.random() - 0.5) * w.spread;
        dir.y += (Math.random() - 0.5) * w.spread * 0.5;
        dir.z += (Math.random() - 0.5) * w.spread;
        dir.normalize();

        if (w.aoe > 0) {
          createProjectile(origin, dir, this, true, w.aoe);
        } else {
          createProjectile(origin, dir, this, false);
        }
      }
      return true;
    } else if (w.currentAmmo <= 0 && !w.isReloading) {
      w.startReload();
      this.triggerReloadAnim(w.reloadTime);
    }
    return false;
  }

  /** Reload */
  reload() {
    const w = this.getWeapon();
    if (w && !w.isReloading) {
      w.startReload();
      this.triggerReloadAnim(w.reloadTime);
    }
  }

  /** Open glider */
  openGlider() {
    if (this.grounded || this.isGliding) return;
    this.isGliding = true;
    this.verticalVel = -CFG.gliderDescent;
    this.setAnim(animStates.GLIDE);

    // Create glider mesh
    if (!this.gliderMesh) {
      const gGroup = new THREE.Group();
      const gMat = new THREE.MeshStandardMaterial({ color: this.teamColor, roughness: 0.4, metalness: 0.3, side: THREE.DoubleSide });
      // Left wing
      const wingL = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), gMat);
      wingL.position.set(-1.2, 1.5, 0); wingL.rotation.z = 0.3;
      gGroup.add(wingL);
      // Right wing
      const wingR = new THREE.Mesh(new THREE.PlaneGeometry(2, 1.5), gMat);
      wingR.position.set(1.2, 1.5, 0); wingR.rotation.z = -0.3;
      gGroup.add(wingR);
      // Center bar
      const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.5, 4), new THREE.MeshStandardMaterial({ color: 0x888888 }));
      bar.rotation.z = Math.PI / 2; bar.position.y = 1.5;
      gGroup.add(bar);
      this.gliderMesh = gGroup;
    }
    this.group.add(this.gliderMesh);
  }

  /** Play emote */
  playEmote() {
    this.setAnim(animStates.EMOTE);
    setTimeout(() => { if (this.animState === animStates.EMOTE) this.setAnim(animStates.IDLE); }, 3000);
  }
}

// ═══════════════════════════════════════════════════════════════════
// PROJECTILE SYSTEM
// ═══════════════════════════════════════════════════════════════════

function createProjectile(origin, direction, owner, isRocket = false, aoeRadius = 0) {
  const speed = isRocket ? CFG.rocketSpeed : CFG.projSpeed;
  const color = owner.teamColor;

  let mesh;
  if (isRocket) {
    mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.12, 0.4, 6),
      new THREE.MeshBasicMaterial({ color: 0xff4400 })
    );
    mesh.rotation.x = Math.PI / 2;
  } else {
    mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 6, 4),
      new THREE.MeshBasicMaterial({ color })
    );
  }
  mesh.position.copy(origin);
  scene.add(mesh);

  // Tracer light
  const light = new THREE.PointLight(color, 0.8, 6);
  light.position.copy(origin);
  scene.add(light);

  // Trail for rockets
  let trail = null;
  if (isRocket) {
    trail = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.3 })
    );
    mesh.add(trail);
  }

  projectiles.push({
    mesh, light, trail,
    dir: direction.clone(),
    owner, speed,
    life: CFG.projLifetime,
    isRocket, aoeRadius
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    const move = p.dir.clone().multiplyScalar(p.speed * dt);
    p.mesh.position.add(move);
    p.light.position.copy(p.mesh.position);

    // Hit players
    for (const pl of players) {
      if (pl === p.owner || !pl.alive) continue;
      const dist = p.mesh.position.distanceTo(pl.group.position.clone().add(new THREE.Vector3(0, 1, 0)));
      const hitRadius = p.isRocket ? p.aoeRadius : 0.5;
      if (dist < hitRadius + CFG.playerRadius) {
        if (p.isRocket) {
          // AOE damage
          for (const pl2 of players) {
            if (pl2 === p.owner || !pl2.alive) continue;
            const d2 = p.mesh.position.distanceTo(pl2.group.position.clone().add(new THREE.Vector3(0, 1, 0)));
            if (d2 < p.aoeRadius) {
              const dmgMul = 1 - (d2 / p.aoeRadius) * 0.5;
              const w = p.owner.getWeapon();
              pl2.takeDamage((w ? w.damage : 100) * dmgMul, p.owner);
            }
          }
          // Explosion visual
          createExplosion(p.mesh.position.clone());
        } else {
          const w = p.owner.getWeapon();
          pl.takeDamage(w ? w.damage : 10, p.owner);
        }
        removeProjectile(i);
        break;
      }
    }

    // Ground collision
    const gy = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
    if (p.mesh.position.y < gy) {
      if (p.isRocket) {
        createExplosion(p.mesh.position.clone());
        // AOE on ground hit
        for (const pl of players) {
          if (pl === p.owner || !pl.alive) continue;
          const d2 = p.mesh.position.distanceTo(pl.group.position.clone().add(new THREE.Vector3(0, 1, 0)));
          if (d2 < p.aoeRadius) {
            const w = p.owner.getWeapon();
            pl.takeDamage((w ? w.damage : 100) * (1 - d2 / p.aoeRadius * 0.5), p.owner);
          }
        }
      }
      removeProjectile(i);
      continue;
    }

    if (p.life <= 0) removeProjectile(i);
  }
}

function removeProjectile(idx) {
  const p = projectiles[idx];
  scene.remove(p.mesh);
  scene.remove(p.light);
  if (p.mesh.geometry) p.mesh.geometry.dispose();
  if (p.mesh.material) p.mesh.material.dispose();
  projectiles.splice(idx, 1);
}

/** Explosion particle effect */
function createExplosion(pos) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.15, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xff4400 : 0xffaa00, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(pos);
    scene.add(m);
    const vel = new THREE.Vector3((Math.random()-0.5)*8, Math.random()*6, (Math.random()-0.5)*8);
    const start = performance.now();
    (function anim() {
      const t = (performance.now() - start) / 1000;
      if (t > 0.8) { scene.remove(m); geo.dispose(); mat.dispose(); return; }
      m.position.addScaledVector(vel, 0.016);
      vel.y -= 15 * 0.016;
      mat.opacity = 1 - t / 0.8;
      m.scale.setScalar(1 + t * 2);
      requestAnimationFrame(anim);
    })();
  }
}

// ═══════════════════════════════════════════════════════════════════
// PICKUP SYSTEM — Weapons, ammo, health, materials
// ═══════════════════════════════════════════════════════════════════

/** Spawn loot pickups across the map */
function spawnPickups() {
  // Weapon spawns
  const weaponTypes = [
    { type: 'ar', rarities: ['common', 'rare', 'epic'] },
    { type: 'shotgun', rarities: ['common', 'rare'] },
    { type: 'sniper', rarities: ['rare', 'epic'] },
    { type: 'rocket', rarities: ['epic', 'legendary'] }
  ];

  for (let i = 0; i < 25; i++) {
    const x = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    const z = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    const y = getTerrainHeight(x, z) + 1;

    const wt = weaponTypes[Math.floor(Math.random() * weaponTypes.length)];
    const rarity = wt.rarities[Math.floor(Math.random() * wt.rarities.length)];
    spawnWeaponPickup(x, y, z, wt.type, rarity);
  }

  // Shield pickups
  for (let i = 0; i < 10; i++) {
    const x = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    const z = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    spawnShieldPickup(x, getTerrainHeight(x, z) + 1, z);
  }

  // Material pickups
  for (let i = 0; i < 15; i++) {
    const x = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    const z = (Math.random() - 0.5) * CFG.mapSize * 0.8;
    const mat = ['wood', 'stone', 'metal'][Math.floor(Math.random() * 3)];
    spawnMaterialPickup(x, getTerrainHeight(x, z) + 1, z, mat);
  }
}

function spawnWeaponPickup(x, y, z, type, rarity) {
  const rc = CFG.rarityColors[rarity];
  const group = new THREE.Group();

  // Weapon model floating
  const mesh = createWeaponMesh(type, rarity);
  mesh.scale.setScalar(2.5);
  group.add(mesh);

  // Rarity glow
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 8, 8),
    new THREE.MeshBasicMaterial({ color: new THREE.Color(rc), transparent: true, opacity: 0.2 })
  );
  group.add(glow);

  // PointLight
  const light = new THREE.PointLight(new THREE.Color(rc), 0.6, 5);
  group.add(light);

  group.position.set(x, y, z);
  scene.add(group);

  pickups.push({ group, type: 'weapon', weaponType: type, rarity, bobOffset: Math.random() * Math.PI * 2 });
}

function spawnShieldPickup(x, y, z) {
  const group = new THREE.Group();
  const shield = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.4, 0),
    new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x2244aa, emissiveIntensity: 0.5, roughness: 0.2, metalness: 0.8 })
  );
  group.add(shield);
  group.add(new THREE.PointLight(0x4488ff, 0.4, 4));
  group.position.set(x, y, z);
  scene.add(group);
  pickups.push({ group, type: 'shield', amount: 25, bobOffset: Math.random() * Math.PI * 2 });
}

function spawnMaterialPickup(x, y, z, matType) {
  const colors = { wood: 0xc8842a, stone: 0x888888, metal: 0x88bbdd };
  const group = new THREE.Group();
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.4, 0.4),
    new THREE.MeshStandardMaterial({ color: colors[matType], roughness: 0.7 })
  );
  group.add(m);
  group.position.set(x, y, z);
  scene.add(group);
  pickups.push({ group, type: 'material', matType, amount: 30, bobOffset: Math.random() * Math.PI * 2 });
}

/** Update pickups (bob animation, player proximity) */
function updatePickups(dt) {
  const time = clock.elapsedTime;
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    // Bob up and down
    p.group.position.y += Math.sin(time * 2 + p.bobOffset) * 0.003;
    // Rotate weapon pickups
    if (p.type === 'weapon') p.group.rotation.y += dt * 1.5;

    // Check proximity to player
    if (player && player.alive) {
      const dist = p.group.position.distanceTo(player.group.position);
      if (dist < 2.5) {
        if (p.type === 'weapon') {
          const w = new WeaponInstance(p.weaponType, p.rarity);
          player.pickupWeapon(w);
          player.lootCollected++;
        } else if (p.type === 'shield') {
          player.shield = Math.min(CFG.maxShield, player.shield + p.amount);
          player.lootCollected++;
        } else if (p.type === 'material') {
          player.materials[p.matType] += p.amount;
          player.lootCollected++;
        }
        scene.remove(p.group);
        pickups.splice(i, 1);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// STORM CIRCLE
// ═══════════════════════════════════════════════════════════════════

class StormCircle {
  constructor() {
    this.currentRadius = CFG.mapSize * 0.7;
    this.targetRadius = CFG.stormFinalRadius;
    this.center = new THREE.Vector3(0, 0, 0);
    this.shrinking = false;
    this.shrinkElapsed = 0;
    this.damageTimer = 0;
    this.damage = CFG.stormDamage;

    // Visual — blue translucent cylinder
    const geo = new THREE.CylinderGeometry(this.currentRadius, this.currentRadius, 60, 64, 1, true);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x2244ff, transparent: true, opacity: 0.15,
      side: THREE.DoubleSide
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.y = 20;
    scene.add(this.mesh);

    // Storm floor ring
    const ringGeo = new THREE.RingGeometry(this.currentRadius - 1, this.currentRadius, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x2244ff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
    this.ring = new THREE.Mesh(ringGeo, ringMat);
    this.ring.rotation.x = -Math.PI / 2;
    this.ring.position.y = 0.1;
    scene.add(this.ring);

    this.startDelay = CFG.stormStartDelay;
  }

  update(dt) {
    // Delay before storm starts shrinking
    if (this.startDelay > 0) {
      this.startDelay -= dt;
      return;
    }

    if (!this.shrinking) {
      this.shrinking = true;
    }

    // Shrink over time
    this.shrinkElapsed += dt;
    const progress = Math.min(this.shrinkElapsed / CFG.stormShrinkTime, 1);
    const newRadius = this.currentRadius + (this.targetRadius - this.currentRadius) * progress;

    // Update mesh
    this.mesh.geometry.dispose();
    this.mesh.geometry = new THREE.CylinderGeometry(newRadius, newRadius, 60, 64, 1, true);
    this.ring.geometry.dispose();
    this.ring.geometry = new THREE.RingGeometry(newRadius - 1, newRadius + 0.5, 64);

    // Increase damage over time
    this.damage = CFG.stormDamage * (1 + progress * 3);

    // Damage players outside circle
    this.damageTimer -= dt;
    if (this.damageTimer <= 0) {
      this.damageTimer = 1;
      for (const p of players) {
        if (!p.alive) continue;
        const dist = Math.sqrt(
          (p.group.position.x - this.center.x) ** 2 +
          (p.group.position.z - this.center.z) ** 2
        );
        if (dist > newRadius) {
          p.takeDamage(this.damage, null);
          if (p === player) {
            document.getElementById('storm-warn').style.display = 'block';
          }
        } else if (p === player) {
          document.getElementById('storm-warn').style.display = 'none';
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// BUILDING MECHANIC
// ═══════════════════════════════════════════════════════════════════

/** Create a build preview (ghost) */
function createBuildPreview(type) {
  if (buildPreview) scene.remove(buildPreview);

  let geo;
  const gridSize = CFG.buildGridSize;
  switch (type) {
    case 'wall':
      geo = new THREE.BoxGeometry(gridSize, gridSize, 0.2);
      break;
    case 'floor':
      geo = new THREE.BoxGeometry(gridSize, 0.2, gridSize);
      break;
    case 'ramp':
      geo = new THREE.BoxGeometry(gridSize, 0.2, gridSize * 1.42);
      break;
  }

  const mat = new THREE.MeshBasicMaterial({
    color: 0x00aaff, transparent: true, opacity: 0.3, side: THREE.DoubleSide
  });
  buildPreview = new THREE.Mesh(geo, mat);
  buildPreview.name = 'buildPreview';
  scene.add(buildPreview);
}

/** Place a build piece */
function placeBuild(type) {
  if (!player || !player.alive) return;
  const matType = 'wood'; // Use wood by default
  if (player.materials[matType] < CFG.buildCost) return;

  const gridSize = CFG.buildGridSize;
  let geo;
  const matColor = { wood: 0x886633, stone: 0x888888, metal: 0x88bbdd };
  const hpMap = CFG.buildHealth;

  switch (type) {
    case 'wall':
      geo = new THREE.BoxGeometry(gridSize, gridSize, 0.2);
      break;
    case 'floor':
      geo = new THREE.BoxGeometry(gridSize, 0.2, gridSize);
      break;
    case 'ramp':
      geo = new THREE.BoxGeometry(gridSize, 0.2, gridSize * 1.42);
      break;
  }

  const mat = new THREE.MeshStandardMaterial({ color: matColor[matType], roughness: 0.7, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Snap to grid
  const pos = buildPreview.position.clone();
  pos.x = Math.round(pos.x / gridSize) * gridSize;
  pos.z = Math.round(pos.z / gridSize) * gridSize;
  pos.y = Math.max(getTerrainHeight(pos.x, pos.z) + 0.1, Math.round(pos.y / gridSize) * gridSize);
  mesh.position.copy(pos);

  if (type === 'ramp') mesh.rotation.x = -Math.PI / 4;

  scene.add(mesh);

  player.materials[matType] -= CFG.buildCost;
  buildPieces.push({ mesh, hp: hpMap[matType], maxHp: hpMap[matType], type, matType });
}

/** Update build preview position */
function updateBuildPreview() {
  if (!buildPreview || !player || !player.alive) return;

  // Raycast from camera through mouse
  const rc = new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2(0, 0), camera);
  const dir = rc.ray.direction.clone();
  const origin = player.group.position.clone();
  origin.y += 1.5;

  // Place at forward position
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.group.quaternion);
  const pos = origin.clone().add(forward.multiplyScalar(4));

  const gridSize = CFG.buildGridSize;
  pos.x = Math.round(pos.x / gridSize) * gridSize;
  pos.z = Math.round(pos.z / gridSize) * gridSize;
  pos.y = Math.max(getTerrainHeight(pos.x, pos.z), Math.round(pos.y / gridSize) * gridSize);

  buildPreview.position.copy(pos);
}

function selectBuild(type) {
  buildType = type;
  document.querySelectorAll('.build-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  createBuildPreview(type);
}

// ═══════════════════════════════════════════════════════════════════
// AI BOT LOGIC
// ═══════════════════════════════════════════════════════════════════

function updateAI(bot, dt) {
  if (!bot.alive) return;

  // Find nearest alive player
  let nearest = null, nearDist = Infinity;
  for (const p of players) {
    if (p === bot || !p.alive) continue;
    const d = bot.group.position.distanceTo(p.group.position);
    if (d < nearDist) { nearDist = d; nearest = p; }
  }

  bot.aiReactionTimer -= dt;
  if (bot.aiReactionTimer > 0) return;
  bot.aiReactionTimer = CFG.botReaction;

  bot.aiStateTimer -= dt;
  if (bot.aiStateTimer <= 0) {
    if (nearDist < 15) {
      bot.aiState = Math.random() < 0.5 ? 'strafe' : 'chase';
    } else if (nearDist < 40) {
      bot.aiState = 'chase';
    } else {
      bot.aiState = 'wander';
    }
    bot.aiStateTimer = 1 + Math.random() * 2;
    bot.aiStrafeDir = Math.random() < 0.5 ? 1 : -1;
  }

  const moveVec = new THREE.Vector3();
  const speed = CFG.botSpeed;

  if (nearest) {
    const toTarget = nearest.group.position.clone().sub(bot.group.position);
    toTarget.y = 0;
    const dist = toTarget.length();
    const forward = toTarget.clone().normalize();

    switch (bot.aiState) {
      case 'chase':
        moveVec.copy(forward).multiplyScalar(speed);
        break;
      case 'strafe':
        const right = new THREE.Vector3(-forward.z, 0, forward.x);
        moveVec.copy(right).multiplyScalar(speed * 0.7 * bot.aiStrafeDir);
        moveVec.add(forward.clone().multiplyScalar(speed * 0.3));
        break;
      case 'wander':
        const toWander = bot.aiWanderTarget.clone().sub(bot.group.position);
        toWander.y = 0;
        if (toWander.length() < 5) {
          bot.aiWanderTarget.set((Math.random()-0.5)*CFG.mapSize*0.7, 0, (Math.random()-0.5)*CFG.mapSize*0.7);
        }
        moveVec.copy(toWander.normalize()).multiplyScalar(speed * 0.6);
        break;
    }

    // Face target
    bot.group.rotation.y = Math.atan2(forward.x, forward.z);

    // Shoot
    if (dist < 50 && bot.getWeapon()) {
      bot.aiShootTimer -= dt;
      if (bot.aiShootTimer <= 0) {
        const aimTarget = nearest.group.position.clone();
        aimTarget.y += 1.5;
        // Inaccuracy
        aimTarget.x += (Math.random() - 0.5) * dist * CFG.botAccuracy;
        aimTarget.z += (Math.random() - 0.5) * dist * CFG.botAccuracy;
        bot.shoot(aimTarget);
        bot.aiShootTimer = bot.getWeapon().fireRate / 1000 + Math.random() * 0.2;
      }
    }
  }

  bot.velocity.copy(moveVec);

  // Pick up nearby items
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    const d = bot.group.position.distanceTo(p.group.position);
    if (d < 2.5) {
      if (p.type === 'weapon') {
        const w = new WeaponInstance(p.weaponType, p.rarity);
        bot.pickupWeapon(w);
      } else if (p.type === 'shield') {
        bot.shield = Math.min(CFG.maxShield, bot.shield + p.amount);
      } else if (p.type === 'material') {
        bot.materials[p.matType] += p.amount;
      }
      scene.remove(p.group);
      pickups.splice(i, 1);
    }
  }

  // Set animation
  if (moveVec.lengthSq() > 0.1) {
    bot.setAnim(animStates.RUN);
  } else {
    bot.setAnim(animStates.IDLE);
  }
}

// ═══════════════════════════════════════════════════════════════════
// CAMERA — Over-the-shoulder third person
// ═══════════════════════════════════════════════════════════════════

function updateCamera(dt) {
  if (!player || !player.alive) return;

  // Calculate desired camera position
  const dist = isADS ? camDist * CFG.adsZoom : camDist;
  const height = isADS ? CFG.camHeight * 0.8 : CFG.camHeight;

  // Shoulder offset
  const shoulderOffset = new THREE.Vector3(0.6, 0, 0);
  shoulderOffset.applyQuaternion(player.group.quaternion);

  const behind = new THREE.Vector3(0, 0, 1);
  behind.applyQuaternion(player.group.quaternion);

  const targetPos = player.group.position.clone()
    .add(shoulderOffset)
    .add(behind.multiplyScalar(dist))
    .add(new THREE.Vector3(0, height, 0));

  // Camera collision — push closer if hitting obstacles
  const dir = targetPos.clone().sub(player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
  const rc = new THREE.Raycaster(
    player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)),
    dir.clone().normalize(),
    0,
    dir.length()
  );

  // Check against build pieces and terrain
  const colliders = buildPieces.map(b => b.mesh);
  const hits = rc.intersectObjects(colliders, false);
  if (hits.length > 0 && hits[0].distance < dir.length()) {
    const safeDist = Math.max(1, hits[0].distance - 0.5);
    targetPos.copy(player.group.position.clone().add(new THREE.Vector3(0, 1.5, 0)).add(dir.clone().normalize().multiplyScalar(safeDist)));
  }

  camera.position.lerp(targetPos, CFG.camSmooth);

  // Look at player head area
  const lookTarget = player.group.position.clone().add(new THREE.Vector3(0, 1.8, 0));
  if (isADS) {
    // When ADS, look further ahead in aim direction
    const aimDir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.group.quaternion);
    lookTarget.add(aimDir.multiplyScalar(10));
  }
  camera.lookAt(lookTarget);
}

// ═══════════════════════════════════════════════════════════════════
// INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════

function initInput() {
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].includes(e.code)) e.preventDefault();

    // Weapon switching (1-5)
    if (e.code >= 'Digit1' && e.code <= 'Digit5' && player && player.alive) {
      const slot = parseInt(e.code.charAt(5)) - 1;
      if (player.weapons[slot]) player.equipWeapon(slot);
    }

    // R = Reload
    if (e.code === 'KeyR' && player && player.alive) player.reload();

    // Q = Build mode toggle
    if (e.code === 'KeyQ' && player && player.alive) {
      buildMode = !buildMode;
      document.getElementById('build-indicator').style.display = buildMode ? 'flex' : 'none';
      if (buildMode) { createBuildPreview(buildType); }
      else if (buildPreview) { scene.remove(buildPreview); buildPreview = null; }
    }

    // B = Emote
    if (e.code === 'KeyB' && player && player.alive) player.playEmote();

    // Space = Jump or open glider
    if (e.code === 'Space' && player && player.alive) {
      if (player.grounded) player.jump();
      else if (!player.isGliding && player.verticalVel < 0) player.openGlider();
    }

    // E = Interact (pickups handled by proximity)
  });

  window.addEventListener('keyup', e => { keys[e.code] = false; });

  window.addEventListener('mousemove', e => {
    if (gameState !== 'playing' || !document.pointerLockElement) return;
    camYaw -= e.movementX * 0.002;
    camPitch -= e.movementY * 0.002;
    camPitch = Math.max(-0.5, Math.min(1.2, camPitch));
  });

  window.addEventListener('mousedown', e => {
    if (gameState !== 'playing') return;
    if (!document.pointerLockElement) {
      renderer.domElement.requestPointerLock();
      return;
    }
    if (e.button === 0) mouseDown = true;
    if (e.button === 2) { rightMouseDown = true; isADS = true; document.getElementById('crosshair').classList.add('ads'); }
  });
  window.addEventListener('mouseup', e => {
    if (e.button === 0) mouseDown = false;
    if (e.button === 2) { rightMouseDown = false; isADS = false; document.getElementById('crosshair').classList.remove('ads'); }
  });

  window.addEventListener('wheel', e => {
    if (!player || !player.alive) return;
    const dir = e.deltaY > 0 ? 1 : -1;
    let slot = player.activeSlot + dir;
    while (slot < 0 || !player.weapons[slot]) {
      slot += dir;
      if (slot > 4) slot = 0;
      if (slot < 0) slot = 4;
    }
    if (player.weapons[slot]) player.equipWeapon(slot);
  });

  window.addEventListener('contextmenu', e => e.preventDefault());

  // Pointer lock
  renderer.domElement.addEventListener('click', () => {
    if (gameState === 'playing') renderer.domElement.requestPointerLock();
  });
}

/** Process player input each frame */
function updatePlayerInput(dt) {
  if (!player || !player.alive) return;

  const speed = keys['ShiftLeft'] ? CFG.sprintSpeed : CFG.playerSpeed;
  const moveDir = new THREE.Vector3();

  // Movement relative to camera yaw
  const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);
  const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw);

  if (keys['KeyW']) moveDir.add(forward);
  if (keys['KeyS']) moveDir.sub(forward);
  if (keys['KeyD']) moveDir.add(right);
  if (keys['KeyA']) moveDir.sub(right);

  if (moveDir.lengthSq() > 0) {
    moveDir.normalize().multiplyScalar(speed);
    player.setAnim(isADS ? animStates.ADS : animStates.RUN);
  } else {
    if (player.animState === animStates.RUN) player.setAnim(isADS ? animStates.ADS : animStates.IDLE);
  }

  player.velocity.copy(moveDir);

  // Face camera direction
  player.group.rotation.y = camYaw;

  // Shooting
  if (mouseDown && player.getWeapon()) {
    const w = player.getWeapon();
    if (w.auto || w.fireCooldown <= 0) {
      // Shoot toward crosshair center
      const rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(0, 0), camera);
      const aimTarget = rc.ray.origin.clone().add(rc.ray.direction.clone().multiplyScalar(50));
      aimTarget.y = Math.max(aimTarget.y, getTerrainHeight(aimTarget.x, aimTarget.z));
      player.shoot(aimTarget);
    }
  }

  // Build mode
  if (buildMode) updateBuildPreview();

  // Animation overrides
  if (isADS && player.grounded && moveDir.lengthSq() < 0.1) {
    player.setAnim(animStates.ADS);
  }
}

// ═══════════════════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════════════════

function updateMinimap() {
  if (!minimapCtx) {
    const c = document.getElementById('minimap-canvas');
    minimapCtx = c.getContext('2d');
  }
  const ctx = minimapCtx;
  const W = 160, H = 160;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = 'rgba(0,40,0,0.5)';
  ctx.beginPath();
  ctx.arc(80, 80, 78, 0, Math.PI * 2);
  ctx.fill();

  // Storm circle
  if (storm) {
    const scale = W / CFG.mapSize;
    ctx.strokeStyle = 'rgba(68,68,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(80 + storm.center.x * scale, 80 + storm.center.z * scale, storm.currentRadius * scale, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Player positions
  for (const p of players) {
    if (!p.alive) continue;
    const scale = W / CFG.mapSize;
    const x = 80 + p.group.position.x * scale;
    const y = 80 + p.group.position.z * scale;

    if (p === player) {
      ctx.fillStyle = '#0f0';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      // Direction indicator
      ctx.strokeStyle = '#0f0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      const dx = Math.sin(p.group.rotation.y) * 8;
      const dy = -Math.cos(p.group.rotation.y) * 8;
      ctx.lineTo(x + dx, y + dy);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// HUD UPDATE
// ═══════════════════════════════════════════════════════════════════

function updateHUD() {
  if (!player) return;

  // Health
  const hpPct = Math.max(0, player.hp / CFG.maxHP * 100);
  document.getElementById('hp-fill').style.width = hpPct + '%';
  document.getElementById('hp-fill').style.background = hpPct > 50 ? 'linear-gradient(90deg,#2dff2d,#66ff44)' : hpPct > 25 ? 'linear-gradient(90deg,#ffaa00,#ffdd44)' : 'linear-gradient(90deg,#ff2244,#ff6677)';
  document.getElementById('hp-text').textContent = `${Math.ceil(player.hp)}/${CFG.maxHP}`;

  // Shield
  const shPct = Math.max(0, player.shield / CFG.maxShield * 100);
  document.getElementById('shield-fill').style.width = shPct + '%';
  document.getElementById('shield-text').textContent = `${Math.ceil(player.shield)}/${CFG.maxShield}`;

  // Weapon bar
  const wbar = document.getElementById('weapon-bar');
  wbar.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const w = player.weapons[i];
    const isActive = i === player.activeSlot;
    const slot = document.createElement('div');
    slot.className = 'weapon-slot' + (isActive ? ' active' : '') + (w ? ' rarity-' + w.rarity : '');
    slot.innerHTML = `<span class="slot-num">${i+1}</span>${w ? `<span class="w-name">${w.name}</span><span class="w-ammo">${w.isReloading ? '...' : w.currentAmmo}</span>` : '<span style="color:#444">—</span>'}`;
    slot.onclick = () => { if (w) player.equipWeapon(i); };
    wbar.appendChild(slot);
  }

  // Ammo display
  const w = player.getWeapon();
  if (w) {
    document.getElementById('ammo-cur').textContent = w.isReloading ? '...' : w.currentAmmo;
    document.getElementById('ammo-res').textContent = '/ ' + w.reserveAmmo;
  }

  // Materials
  document.getElementById('mat-wood').textContent = player.materials.wood;
  document.getElementById('mat-stone').textContent = player.materials.stone;
  document.getElementById('mat-metal').textContent = player.materials.metal;

  // Coins
  if (localUser) document.getElementById('coin-val').textContent = localUser.coins;

  // Alive count
  document.getElementById('alive-count').textContent = players.filter(p => p.alive).length;
}

function addKillFeed(killerId, victimId) {
  const feed = document.getElementById('kill-feed');
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  const kIsPlayer = killerId === player?.id;
  const vIsPlayer = victimId === player?.id;
  msg.innerHTML = `<span style="color:${kIsPlayer?'#0f0':'#f44'}">${kIsPlayer?'You':killerId}</span> eliminated <span style="color:${vIsPlayer?'#0f0':'#f44'}">${vIsPlayer?'You':victimId}</span>`;
  feed.prepend(msg);
  setTimeout(() => { if (msg.parentNode) msg.parentNode.removeChild(msg); }, 4200);
  while (feed.children.length > 5) feed.removeChild(feed.lastChild);
}

// ═══════════════════════════════════════════════════════════════════
// MATCH END
// ═══════════════════════════════════════════════════════════════════

async function endMatch(winner) {
  gameState = 'over';
  if (document.pointerLockElement) document.exitPointerLock();

  const isVictory = winner === player;
  const overlay = document.getElementById('victory-overlay');
  overlay.classList.add('open');

  const vText = document.getElementById('victory-text');
  vText.textContent = isVictory ? 'VICTORY ROYALE!' : 'ELIMINATED';
  vText.className = isVictory ? 'victory-win' : 'victory-loss';

  document.getElementById('victory-sub').textContent = isVictory ? '#1 out of ' + players.length : `Eliminated by ${winner.id}`;

  document.getElementById('victory-stats').innerHTML = `
    Kills: ${player.kills}<br>
    Damage Dealt: ${Math.round(player.damageDealt)}<br>
    Loot Collected: ${player.lootCollected}<br>
    Coins Earned: ${player.kills * 15 + (isVictory ? 50 : 0)}
  `;

  // Submit to backend
  if (localUser) {
    await API.matchResult(localUser.id, isVictory, player.kills, player.deaths, Math.round(player.damageDealt), player.lootCollected);
    localUser.coins += player.kills * 15 + (isVictory ? 50 : 0);
    saveLocal();
  }

  // Confetti for victory
  if (isVictory) spawnConfetti();
}

/** Simple confetti effect */
function spawnConfetti() {
  const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff];
  for (let i = 0; i < 60; i++) {
    const geo = new THREE.PlaneGeometry(0.3, 0.3);
    const mat = new THREE.MeshBasicMaterial({ color: colors[i % colors.length], side: THREE.DoubleSide });
    const m = new THREE.Mesh(geo, mat);
    m.position.copy(player.group.position).add(new THREE.Vector3((Math.random()-0.5)*10, 8+Math.random()*5, (Math.random()-0.5)*10));
    m.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    scene.add(m);
    const vel = new THREE.Vector3((Math.random()-0.5)*3, -2-Math.random()*3, (Math.random()-0.5)*3);
    const rotVel = new THREE.Vector3(Math.random()*5, Math.random()*5, Math.random()*5);
    const start = performance.now();
    (function anim() {
      const t = (performance.now() - start) / 1000;
      if (t > 3) { scene.remove(m); geo.dispose(); mat.dispose(); return; }
      m.position.addScaledVector(vel, 0.016);
      m.rotation.x += rotVel.x * 0.016;
      m.rotation.y += rotVel.y * 0.016;
      requestAnimationFrame(anim);
    })();
  }
}

// ═══════════════════════════════════════════════════════════════════
// GAME START
// ═══════════════════════════════════════════════════════════════════

function startGame() {
  gameState = 'playing';
  document.getElementById('menu-overlay').classList.remove('visible');
  document.getElementById('hud').style.display = 'block';

  // Clear existing
  players.forEach(p => scene.remove(p.group));
  players = [];
  projectiles.forEach((p, i) => removeProjectile(0));
  projectiles = [];
  pickups.forEach(p => scene.remove(p.group));
  pickups = [];
  buildPieces.forEach(b => scene.remove(b.mesh));
  buildPieces = [];
  if (storm) { scene.remove(storm.mesh); scene.remove(storm.ring); }

  // Create player
  player = new Player('You', 0x2288ff, new THREE.Vector3(0, 0, 0));
  players.push(player);

  // Create bots
  const botColors = [0xff4444, 0xff8844, 0xffaa00, 0x44ff44, 0x44ffff, 0x8844ff, 0xff44ff, 0xff4488, 0xaa8844];
  for (let i = 0; i < CFG.botCount; i++) {
    const angle = (i / CFG.botCount) * Math.PI * 2;
    const dist = 30 + Math.random() * 40;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    const bot = new Player('Bot_' + (i + 1), botColors[i % botColors.length], new THREE.Vector3(x, 0, z), true);
    // Give bots random weapons
    const weps = ['ar', 'shotgun', 'sniper'];
    const rars = ['common', 'rare', 'epic'];
    const wType = weps[Math.floor(Math.random() * weps.length)];
    const wRar = rars[Math.floor(Math.random() * rars.length)];
    bot.weapons[1] = new WeaponInstance(wType, wRar);
    bot.equipWeapon(1);
    players.push(bot);
  }

  // Spawn pickups
  spawnPickups();

  // Storm
  storm = new StormCircle();

  // Position camera
  camera.position.copy(player.group.position.clone().add(new THREE.Vector3(0, CFG.camHeight, CFG.camDist)));

  // Request pointer lock
  renderer.domElement.requestPointerLock();
}

// ═══════════════════════════════════════════════════════════════════
// MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════════════

function gameLoop() {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState === 'playing') {
    // Player input
    updatePlayerInput(dt);

    // Update all players
    for (const p of players) {
      if (p.isAI) updateAI(p, dt);
      p.update(dt);
    }

    // Projectiles
    updateProjectiles(dt);

    // Pickups
    updatePickups(dt);

    // Storm
    if (storm) storm.update(dt);

    // Camera
    updateCamera(dt);

    // HUD
    updateHUD();

    // Minimap
    if (Math.floor(clock.elapsedTime * 4) % 2 === 0) updateMinimap();

    // Build mode — place on click
    if (buildMode && mouseDown && buildPreview) {
      placeBuild(buildType);
      mouseDown = false; // prevent rapid placement
    }
  }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════════
// WINDOW RESIZE
// ═══════════════════════════════════════════════════════════════════

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// ═══════════════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════════════

function init() {
  initScene();
  buildMap();
  initInput();

  // Try to restore session
  if (loadLocal()) onAuth();

  // Start render loop
  gameLoop();
}

init();
</script>
