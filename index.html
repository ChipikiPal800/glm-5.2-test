<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Arena Battle — 3D Battle Royale</title>
<style>
/* ═══════════════════════════════════════════════════════════
   GLOBAL
   ═══════════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;cursor:crosshair}
canvas{display:block;width:100%;height:100%}

/* ═══════════════════════════════════════════════════════════
   HUD — FORTNITE STYLE
   ═══════════════════════════════════════════════════════════ */
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none}

/* Health + Shield bars */
#bars-wrap{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:300px}
.bar-row{display:flex;align-items:center;gap:6px;margin:2px 0}
.bar-icon{font-size:14px;width:18px;text-align:center}
.bar-bg{flex:1;height:16px;background:rgba(0,0,0,0.5);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.15)}
.bar-fill{height:100%;transition:width .2s;border-radius:2px}
#hp-fill{background:linear-gradient(90deg,#2dff2d,#66ff44);width:100%}
#shield-fill{background:linear-gradient(90deg,#4488ff,#66aaff);width:100%}
.bar-text{font-size:11px;width:40px;text-align:right;text-shadow:0 0 4px #000}

/* Weapon bar */
#weapon-bar{position:absolute;bottom:16px;right:16px;display:flex;gap:4px;pointer-events:auto}
.weapon-slot{width:64px;height:64px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.2);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:all .15s}
.weapon-slot.active{border-color:#fff;background:rgba(255,255,255,0.12);transform:scale(1.1)}
.weapon-slot .slot-num{position:absolute;top:2px;left:4px;font-size:10px;color:#888}
.weapon-slot .w-name{font-size:9px;margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.weapon-slot .w-ammo{font-size:14px;font-weight:700}
.weapon-slot canvas{width:36px;height:28px}
.rarity-common{border-color:#888!important}
.rarity-uncommon{border-color:#2dff2d!important}
.rarity-rare{border-color:#4488ff!important}
.rarity-epic{border-color:#aa44ff!important}
.rarity-legendary{border-color:#ffd700!important}

/* Ammo counter */
#ammo-display{position:absolute;bottom:90px;right:20px;font-size:13px;text-shadow:0 0 6px #000}
#ammo-display .cur{font-size:28px;font-weight:700}
#ammo-display .res{color:#aaa}

/* Minimap */
#minimap{position:absolute;top:16px;right:16px;width:160px;height:160px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);overflow:hidden;background:rgba(0,40,0,0.5)}
#minimap canvas{width:100%;height:100%;border-radius:50%}

/* Kill feed */
#kill-feed{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px}
.kill-msg{font-size:12px;color:#fff;text-shadow:0 0 4px #000;padding:2px 10px;background:rgba(0,0,0,0.4);border-radius:3px;animation:fadeKill 4s forwards}
@keyframes fadeKill{0%,70%{opacity:1}100%{opacity:0}}

/* Storm warning */
#storm-warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:#44aaff;text-shadow:0 0 20px #2288ff;display:none;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

/* Player count */
#player-count{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:14px;color:#fff;text-shadow:0 0 6px #000;margin-top:-40px}
#player-count span{color:#ff4444;font-weight:700}

/* Crosshair */
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;transition:all .15s}
#crosshair .ch{position:absolute;background:rgba(255,255,255,0.85);box-shadow:0 0 3px rgba(255,255,255,0.4)}
.ch-t{width:2px;height:12px;left:-1px;top:-18px}
.ch-b{width:2px;height:12px;left:-1px;top:6px}
.ch-l{width:12px;height:2px;left:-18px;top:-1px}
.ch-r{width:12px;height:2px;left:6px;top:-1px}
.ch-dot{width:2px;height:2px;left:-1px;top:-1px;border-radius:50%}
#crosshair.ads .ch-t{top:-8px;height:6px}
#crosshair.ads .ch-b{top:3px;height:6px}
#crosshair.ads .ch-l{left:-8px;width:6px}
#crosshair.ads .ch-r{left:3px;width:6px}

/* Build mode indicator */
#build-indicator{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:none;gap:8px;pointer-events:auto}
.build-btn{padding:8px 16px;border:2px solid rgba(255,255,255,0.3);border-radius:6px;background:rgba(0,0,0,0.5);font-size:12px;color:#fff;cursor:pointer;transition:all .15s;text-align:center;min-width:60px}
.build-btn:hover,.build-btn.active{background:rgba(0,150,255,0.3);border-color:#0af}
.build-btn .key{font-size:10px;color:#888;display:block;margin-top:2px}

/* Materials */
#materials{position:absolute;bottom:90px;left:16px;font-size:12px;text-shadow:0 0 4px #000;display:flex;gap:12px}
.mat-item{display:flex;align-items:center;gap:3px}
.mat-wood{color:#c8842a}.mat-stone{color:#aaa}.mat-metal{color:#88bbdd}

/* Coins */
#coin-hud{position:absolute;top:16px;left:16px;font-size:14px;text-shadow:0 0 6px #000}
#coin-hud span{color:#ffd700}

/* Interaction prompt */
#interact-prompt{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);font-size:14px;text-shadow:0 0 8px #000;display:none;background:rgba(0,0,0,0.5);padding:4px 14px;border-radius:4px}

/* ═══════════════════════════════════════════════════════════
   MAIN MENU — FORTNITE STYLE
   ═══════════════════════════════════════════════════════════ */
#menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0)}
#menu-overlay.visible{background:rgba(0,0,0,0.75)}

#menu-box{text-align:center;max-width:520px;width:90%;position:relative;z-index:2}
#menu-box h1{font-size:42px;letter-spacing:8px;text-transform:uppercase;font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#4df 50%,#f44 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 20px rgba(0,200,255,0.4));
  transform:rotate(-3deg) scale(1.05);margin-bottom:4px}
#menu-box .sub{font-size:12px;color:#4df;letter-spacing:4px;text-transform:uppercase;margin-bottom:30px}

.menu-input{width:100%;padding:10px 14px;margin:5px 0;background:rgba(0,200,255,0.06);border:1px solid rgba(0,200,255,0.25);border-radius:6px;color:#fff;font-size:14px;outline:none}
.menu-input:focus{border-color:#0df;box-shadow:0 0 10px rgba(0,200,255,0.2)}

.menu-btn{display:inline-block;padding:14px 32px;margin:5px;border:2px solid;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all .2s;pointer-events:auto;background:transparent}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,200,255,0.3)}
.btn-play{border-color:#0df;color:#0df;font-size:18px;padding:18px 60px;background:rgba(0,200,255,0.08);animation:glowPulse 2s infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(0,200,255,0.2)}50%{box-shadow:0 0 30px rgba(0,200,255,0.5)}}
.btn-secondary{border-color:rgba(255,255,255,0.3);color:#aaa}
.btn-gold{border-color:#ffd700;color:#ffd700}
.btn-danger{border-color:#f44;color:#f44}
#menu-msg{color:#f66;font-size:13px;min-height:18px;margin-top:8px}

.menu-section{display:none;margin-top:16px}
.menu-section.active{display:block}

/* ═══════════════════════════════════════════════════════════
   VICTORY / DEFEAT OVERLAY
   ═══════════════════════════════════════════════════════════ */
#victory-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.8)}
#victory-overlay.open{display:flex}
#victory-text{font-size:56px;font-weight:900;letter-spacing:8px;text-transform:uppercase;margin-bottom:8px}
#victory-sub{font-size:16px;color:#aaa;margin-bottom:24px}
#victory-stats{text-align:center;margin-bottom:20px;font-size:14px;line-height:2}
.victory-win{color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.6)}
.victory-loss{color:#f44;text-shadow:0 0 20px rgba(255,0,0,0.4)}

/* ═══════════════════════════════════════════════════════════
   PANELS (Leaderboard, Skins, Shop)
   ═══════════════════════════════════════════════════════════ */
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;display:none;background:rgba(10,10,20,0.95);border:1px solid rgba(0,200,255,0.2);border-radius:12px;padding:24px;width:440px;max-height:80vh;overflow-y:auto}
.panel.open{display:block}
.panel h2{text-align:center;letter-spacing:3px;margin-bottom:14px}
.panel-close{position:absolute;top:10px;right:14px;cursor:pointer;font-size:20px;color:#f44}
#lb-panel h2{color:#0df}
#skins-panel h2{color:#ffd700}
#shop-panel h2{color:#ffd700}

/* Leaderboard */
#lb-panel table{width:100%;border-collapse:collapse;font-size:11px}
#lb-panel th{color:#0aa;border-bottom:1px solid #033;padding:5px;text-align:left}
#lb-panel td{padding:4px;border-bottom:1px solid rgba(0,255,255,0.06)}

/* Skins */
.skin-card{display:flex;align-items:center;gap:10px;padding:8px;margin:4px 0;border:1px solid rgba(255,255,255,0.08);border-radius:8px;cursor:pointer;transition:all .15s}
.skin-card:hover{background:rgba(255,255,255,0.04)}
.skin-card.equipped{border-color:#0df;background:rgba(0,200,255,0.06)}
.skin-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0}
.skin-info .name{font-size:13px;font-weight:600}
.skin-info .rarity{font-size:10px;text-transform:uppercase}
.skin-info .status{font-size:10px;color:#666}

/* ═══════════════════════════════════════════════════════════
   LOOTBOX MODAL
   ═══════════════════════════════════════════════════════════ */
#lootbox-modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.9)}
#lootbox-modal.open{display:flex}
#lb-canvas{width:350px;height:350px}
#lb-result{margin-top:16px;text-align:center;display:none}
#lb-result h2{font-size:22px;margin-bottom:4px}
#lb-result p{font-size:13px;color:#888}
.rc-common{color:#888!important;text-shadow:0 0 8px #666}
.rc-rare{color:#4488ff!important;text-shadow:0 0 12px #4488ff}
.rc-epic{color:#aa44ff!important;text-shadow:0 0 16px #aa44ff}
.rc-legendary{color:#ffd700!important;text-shadow:0 0 20px #ffd700}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════ */
@media(max-width:700px){
  #menu-box h1{font-size:26px;letter-spacing:4px}
  .menu-btn{padding:10px 18px;font-size:12px}
  .btn-play{padding:14px 40px;font-size:15px}
  #weapon-bar .weapon-slot{width:50px;height:50px}
  #minimap{width:110px;height:110px}
  #bars-wrap{width:220px;bottom:70px}
}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div id="bars-wrap">
    <div class="bar-row"><div class="bar-icon" style="color:#4488ff">🛡</div><div class="bar-bg"><div id="shield-fill" class="bar-fill"></div></div><div class="bar-text" id="shield-text">0/50</div></div>
    <div class="bar-row"><div class="bar-icon" style="color:#2dff2d">❤</div><div class="bar-bg"><div id="hp-fill" class="bar-fill"></div></div><div class="bar-text" id="hp-text">100/100</div></div>
  </div>
  <div id="weapon-bar"></div>
  <div id="ammo-display"><span class="cur" id="ammo-cur">--</span> <span class="res" id="ammo-res">/ --</span></div>
  <div id="minimap"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>
  <div id="kill-feed"></div>
  <div id="storm-warn">⚡ STORM CLOSING IN ⚡</div>
  <div id="player-count">Alive: <span id="alive-count">0</span></div>
  <div id="crosshair"><div class="ch ch-t"></div><div class="ch ch-b"></div><div class="ch ch-l"></div><div class="ch ch-r"></div><div class="ch ch-dot"></div></div>
  <div id="build-indicator">
    <div class="build-btn" data-type="wall" onclick="selectBuild('wall')">Wall<span class="key">1</span></div>
    <div class="build-btn" data-type="floor" onclick="selectBuild('floor')">Floor<span class="key">2</span></div>
    <div class="build-btn" data-type="ramp" onclick="selectBuild('ramp')">Ramp<span class="key">3</span></div>
  </div>
  <div id="materials">
    <div class="mat-item mat-wood">🪵 <span id="mat-wood">0</span></div>
    <div class="mat-item mat-stone">🪨 <span id="mat-stone">0</span></div>
    <div class="mat-item mat-metal">⚙ <span id="mat-metal">0</span></div>
  </div>
  <div id="coin-hud">⭐ <span id="coin-val">0</span></div>
  <div id="interact-prompt">Press E to pick up</div>
</div>

<!-- MENU -->
<div id="menu-overlay" class="visible">
  <div id="menu-box">
    <h1>Arena Battle</h1>
    <p class="sub">Battle Royale</p>
    <div id="menu-msg"></div>
    <div id="sec-auth" class="menu-section active">
      <input class="menu-input" id="inp-user" placeholder="Username" autocomplete="off">
      <input class="menu-input" id="inp-pass" type="password" placeholder="Password">
      <br>
      <button class="menu-btn btn-secondary" onclick="doRegister()">Register</button>
      <button class="menu-btn btn-secondary" onclick="doLogin()">Login</button>
      <button class="menu-btn btn-secondary" style="opacity:.6" onclick="doGuest()">Guest</button>
    </div>
    <div id="sec-mode" class="menu-section">
      <button class="menu-btn btn-play" onclick="startGame()">▶ PLAY</button>
      <br>
      <button class="menu-btn btn-gold" onclick="openLootbox()">SHOP (100⭐)</button>
      <button class="menu-btn btn-secondary" onclick="showLeaderboard()">STATS</button>
      <button class="menu-btn btn-secondary" onclick="showSkins()">LOCKER</button>
      <button class="menu-btn btn-danger" onclick="doLogout()">Logout</button>
      <div id="user-info2" style="font-size:11px;color:#4df;margin-top:10px"></div>
    </div>
  </div>
</div>

<!-- VICTORY -->
<div id="victory-overlay">
  <div id="victory-text"></div>
  <div id="victory-sub"></div>
  <div id="victory-stats"></div>
  <button class="menu-btn btn-play" onclick="backToMenu()" style="font-size:14px;padding:12px 40px">LOBBY</button>
</div>

<!-- PANELS -->
<div id="lb-panel" class="panel"><span class="panel-close" onclick="closeLB()">&times;</span><h2>LEADERBOARD</h2><table><thead><tr><th>#</th><th>Player</th><th>ELO</th><th>Wins</th><th>Kills</th><th>Win%</th></tr></thead><tbody id="lb-body"></tbody></table></div>
<div id="skins-panel" class="panel"><span class="panel-close" onclick="closeSkins()">&times;</span><h2>LOCKER</h2><div id="skins-list"></div></div>

<!-- LOOTBOX -->
<div id="lootbox-modal"><canvas id="lb-canvas" width="350" height="350"></canvas><div id="lb-result"><h2 id="lb-skin-name"></h2><p id="lb-skin-rarity"></p><p id="lb-skin-extra"></p><button class="menu-btn btn-secondary" onclick="closeLootbox()" style="margin-top:12px">Continue</button></div></div>

<!-- THREE.JS CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ARENA BATTLE — Fortnite-Style 3D Battle Royale
   Complete game engine in a single file
   ═══════════════════════════════════════════════════════════════════ */

// ═══════════════════════════════════════════════════════════════════
// CONFIGURATION — Tweak every gameplay number here
// ═══════════════════════════════════════════════════════════════════
const CFG = {
  // Player
  playerSpeed: 10,
  sprintSpeed: 16,
  jumpForce: 12,
  gravity: 28,
  playerHeight: 1.8,
  playerRadius: 0.45,
  maxHP: 100,
  maxShield: 50,
  shieldRegenDelay: 5,     // seconds before shield starts regen
  shieldRegenRate: 8,      // shield per second

  // Camera
  camDist: 6,
  camHeight: 3.5,
  camAngle: 0.6,           // radians above horizon (over-shoulder)
  camSmooth: 0.1,
  adsZoom: 0.5,            // multiplier when ADS (0.5 = 2x zoom)
  camCollisionRadius: 0.3,

  // Weapons (base stats, modified by rarity)
  weaponStats: {
    pistol:   { name:'Pistol',   damage:18,  fireRate:200,  reloadTime:1000, magSize:16, spread:0.015, ammoType:'light',  range:60,  auto:false, rarityMod:{} },
    ar:       { name:'AR',       damage:22,  fireRate:120,  reloadTime:2000, magSize:30, spread:0.035, ammoType:'medium', range:80,  auto:true,  rarityMod:{common:1,rare:1.1,epic:1.25,legendary:1.4} },
    shotgun:  { name:'Shotgun',  damage:14,  fireRate:600,  reloadTime:2500, magSize:5,  spread:0.1,   ammoType:'shells', range:12,  auto:false, pellets:5, rarityMod:{common:1,rare:1.12,epic:1.25,legendary:1.4} },
    sniper:   { name:'Sniper',   damage:100, fireRate:1000, reloadTime:3000, magSize:1,  spread:0.0,   ammoType:'heavy',  range:200, auto:false, rarityMod:{rare:1,epic:1.2,legendary:1.5} },
    rocket:   { name:'Rocket',   damage:150, fireRate:800,  reloadTime:3500, magSize:3,  spread:0.0,   ammoType:'rockets',range:100, auto:false, aoe:6, rarityMod:{epic:1,legendary:1.15} }
  },
  rarityColors: { common:'#888888', uncommon:'#2dff2d', rare:'#4488ff', epic:'#aa44ff', legendary:'#ffd700' },
  rarityDmgMul:  { common:1.0, uncommon:1.1, rare:1.2, epic:1.35, legendary:1.5 },
  rarityReloadMul: { common:1.0, uncommon:0.95, rare:0.9, epic:0.82, legendary:0.75 },
  raritySpreadMul: { common:1.0, uncommon:0.9, rare:0.8, epic:0.65, legendary:0.5 },

  // Projectiles
  projSpeed: 80,
  projLifetime: 2.5,
  rocketSpeed: 35,
  rocketAOE: 6,

  // AI
  botCount: 9,
  botAccuracy: 0.15,
  botReaction: 0.4,
  botSpeed: 7,

  // Map
  mapSize: 200,
  hillCount: 6,
  treeCount: 40,
  buildingCount: 6,

  // Storm
  stormStartDelay: 30,     // seconds before storm starts
  stormShrinkTime: 60,     // seconds for full shrink
  stormDamage: 1,          // HP per second in storm (increases over time)
  stormFinalRadius: 15,

  // Economy
  killCoins: 15,
  winCoins: 50,
  deathCoins: -5,

  // Building
  buildHealth: { wood: 150, stone: 300, metal: 500 },
  buildCost: 10,
  buildPlaceRange: 8,
  buildGridSize: 3,

  // Skydive
  busHeight: 100,
  busSpeed: 30,
  dropDuration: 5,
  gliderDescent: 3,

  // Respawn
  respawnTime: 3
};

// ═══════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════════════
let scene, camera, renderer, clock;
let localUser = null;
let equippedSkin = null;

// Game state
let gameState = 'menu'; // menu | dropping | playing | over
let players = [];
let projectiles = [];
let pickups = [];
let buildPieces = [];
let storm = null;
let player = null;       // local player reference

// Input
const keys = {};
let mousePos = new THREE.Vector2(0, 0);
let mouseDown = false;
let rightMouseDown = false;
let isADS = false;
let isSprinting = false;

// Camera
let camYaw = 0;
let camPitch = 0.3;
let camDist = CFG.camDist;

// Build mode
let buildMode = false;
let buildType = 'wall';
let buildPreview = null;

// Minimap
let minimapCtx;

// Animation
const animStates = { IDLE:'idle', RUN:'run', JUMP:'jump', ADS:'ads', SHOOT:'shoot', RELOAD:'reload', GLIDE:'glide', EMOTE:'emote' };

// Weapon instances
const weaponDefs = {};   // will be populated

// API base
const API_BASE = 'http://localhost:3000/api';

// ═══════════════════════════════════════════════════════════════════
// API CLIENT
// ═══════════════════════════════════════════════════════════════════
const API = {
  async post(url, body) {
    try {
      const r = await fetch(API_BASE + url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      return await r.json();
    } catch(e) { console.warn('API offline',e); return null; }
  },
  async get(url) {
    try { return await (await fetch(API_BASE + url)).json(); }
    catch(e) { console.warn('API offline',e); return null; }
  },
  async register(u,p) { const r=await this.post('/auth/register',{username:u,password:p}); if(r&&r.success){localUser=r.user;saveLocal();} return r; },
  async login(u,p)    { const r=await this.post('/auth/login',{username:u,password:p}); if(r&&r.success){localUser=r.user;saveLocal();} return r; },
  async guest()       { const r=await this.post('/auth/guest',{}); if(r&&r.success){localUser=r.user;saveLocal();} return r; },
  async getUser(id)   { return await this.get('/user/'+id); },

  if(!localUser||localUser.coins<100){menuMsg('Need 100 coins!');return}
  document.getElementById('lootbox-modal').classList.add('open');
  document.getElementById('lb-result').style.display='none';
  const canvas=document.getElementById('lb-canvas');
  if(!lbRenderer){
    lbScene=new THREE.Scene();lbCamera=new THREE.PerspectiveCamera(45,1,0.1,100);
    lbCamera.position.set(0,3,5);lbCamera.lookAt(0,0,0);
    lbRenderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});lbRenderer.setSize(350,350);
    lbScene.add(new THREE.AmbientLight(0x334455));const d=new THREE.DirectionalLight(0xffffff,0.8);d.position.set(3,5,3);lbScene.add(d);
  }
  if(lbBox)lbScene.remove(lbBox);
  const g=new THREE.BoxGeometry(1.5,1.5,1.5);
  const m=new THREE.MeshStandardMaterial({color:0x222244,metalness:0.8,roughness:0.2,emissive:0x111133,emissiveIntensity:0.3});
  lbBox=new THREE.Mesh(g,m);lbBox.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),new THREE.LineBasicMaterial({color:0x00ccff})));
  const rib=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,2),new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xaa8800,emissiveIntensity:0.5}));
  rib.rotation.y=Math.PI/2;rib.position.y=0.83;lbBox.add(rib);lbScene.add(lbBox);
  const start=performance.now();
  (function anim(){
    const t=Math.min((performance.now()-start)/2500,1);
    lbBox.rotation.y+=0.08+(1-t)*0.15;lbBox.position.y=Math.sin(t*Math.PI*6)*0.3*(1-t);m.emissiveIntensity=0.3+t*2;
    lbRenderer.render(lbScene,lbCamera);
    if(t<1)lbAnimId=requestAnimationFrame(anim);else revealLootbox();
  })()
}

function initScene() {
  scene = new THREE.Scene();

  // Sky gradient
  const skyCanvas = document.createElement('canvas');
  skyCanvas.width = 1; skyCanvas.height = 512;
  const skyCtx = skyCanvas.getContext('2d');
  const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#1a3a6a');
  grad.addColorStop(0.3, '#4488cc');
  grad.addColorStop(0.5, '#88bbee');
  grad.addColorStop(0.7, '#bbddff');
  grad.addColorStop(1, '#ddeeff');
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 1, 512);
  const skyTex = new THREE.CanvasTexture(skyCanvas);
  scene.background = skyTex;
  scene.fog = new THREE.Fog(0x88bbee, 80, 250);

  // Camera
  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  // Lighting — bright, vibrant
  const ambient = new THREE.AmbientLight(0x6688aa, 0.7);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(50, 80, 30);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -100;
  sun.shadow.camera.right = 100;
  sun.shadow.camera.top = 100;
  sun.shadow.camera.bottom = -100;
  scene.add(sun);

  const hemi = new THREE.HemisphereLight(0x88bbff, 0x445522, 0.4);
  scene.add(hemi);

  clock = new THREE.Clock();
}

// MAP GENERATION — Fortnite-style island
// ═══════════════════════════════════════════════════════════════════

/** Terrain with vertex displacement for rolling hills */
function createTerrain() {
  const S = CFG.mapSize;
  const segs = 80;
  const geo = new THREE.PlaneGeometry(S, S, segs, segs);
  geo.rotateX(-Math.PI / 2);

  const verts = geo.attributes.position.array;
  for (let i = 0; i < verts.length; i += 3) {
    const x = verts[i], z = verts[i + 2];
    // Gentle rolling hills using layered sine waves
    let h = Math.sin(x * 0.03) * Math.cos(z * 0.025) * 4;
    h += Math.sin(x * 0.07 + 1) * Math.cos(z * 0.06 + 2) * 2;
    h += Math.sin(x * 0.15) * Math.cos(z * 0.12) * 0.5;
    verts[i + 1] = h;
  }
  geo.computeVertexNormals();

  // Vibrant green grass material
  const mat = new THREE.MeshStandardMaterial({
    color: 0x44aa33,
    roughness: 0.9,
    metalness: 0.0,
    flatShading: false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.name = 'terrain';
  scene.add(mesh);
  return mesh;
}

/** Get terrain height at any x,z position using the same formula */
function getTerrainHeight(x, z) {
  let h = Math.sin(x * 0.03) * Math.cos(z * 0.025) * 4;
  h += Math.sin(x * 0.07 + 1) * Math.cos(z * 0.06 + 2) * 2;
  h += Math.sin(x * 0.15) * Math.cos(z * 0.12) * 0.5;
  return h;
}

/** Create a building from boxes + roof */
function createBuilding(x, z, w, d, h, color, roofColor) {
  const group = new THREE.Group();
  const y = getTerrainHeight(x, z);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.1 });
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
  wall.position.set(x, y + h / 2, z);
  wall.castShadow = true; wall.receiveShadow = true;
  group.add(wall);

  // Roof
  const roofMat = new THREE.MeshStandardMaterial({ color: roofColor, roughness: 0.5, metalness: 0.2 });
  const roof = new THREE.Mesh(new THREE.ConeGeometry(Math.max(w, d) * 0.72, 3, 4), roofMat);
  roof.position.set(x, y + h + 1.5, z);
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  group.add(roof);

  // Door (dark opening)
  const door = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 2.2), new THREE.MeshBasicMaterial({ color: 0x222222 }));
  door.position.set(x, y + 1.1, z + d / 2 + 0.01);
  group.add(door);

  // Windows
  const winMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x446688, emissiveIntensity: 0.3, roughness: 0.1, metalness: 0.8 });
  for (let side = 0; side < 4; side++) {
    const winCount = Math.floor(Math.random() * 2) + 1;
    for (let wi = 0; wi < winCount; wi++) {
      const win = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), winMat);
      const angle = (side * Math.PI / 2) + (wi - winCount / 2 + 0.5) * 1.2;
      const rx = Math.sin(angle) * (w / 2 + 0.02);
      const rz = Math.cos(angle) * (d / 2 + 0.02);
      win.position.set(x + rx, y + h * 0.6, z + rz);
      win.rotation.y = angle;
      group.add(win);
    }
  }

  scene.add(group);
  return wall; // return collision mesh
}

/** Create a tree (pine or round) */
function createTree(x, z, type) {
  const y = getTerrainHeight(x, z);
  const group = new THREE.Group();

  const trunkH = 2 + Math.random() * 1.5;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, trunkH, 6),
    new THREE.MeshStandardMaterial({ color: 0x664422, roughness: 0.9 })
  );
  trunk.position.set(x, y + trunkH / 2, z);
  trunk.castShadow = true;
  group.add(trunk);

  if (type === 'pine') {
    for (let i = 0; i < 3; i++) {
      const s = 2.2 - i * 0.6;
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(s, 2, 8),
        new THREE.MeshStandardMaterial({ color: 0x227722, roughness: 0.8 })
      );
      cone.position.set(x, y + trunkH + i * 1.4, z);
      cone.castShadow = true;
      group.add(cone);
    }
  } else {
    const crown = new THREE.Mesh(
      new THREE.SphereGeometry(1.8 + Math.random(), 8, 6),
      new THREE.MeshStandardMaterial({ color: 0x338833, roughness: 0.8 })
    );
    crown.position.set(x, y + trunkH + 1, z);
    crown.castShadow = true;
    group.add(crown);
  }

  scene.add(group);
  return trunk;
}

/** Create water plane */
function createWater() {
  const geo = new THREE.PlaneGeometry(CFG.mapSize * 1.5, CFG.mapSize * 1.5);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x2266aa, transparent: true, opacity: 0.6,
    roughness: 0.1, metalness: 0.3
  });
  const water = new THREE.Mesh(geo, mat);
  water.rotation.x = -Math.PI / 2;
  water.position.y = -1.5;
  scene.add(water);
  return water;
}

/** Generate the complete Fortnite-style map */
function buildMap() {
  const S = CFG.mapSize;
  const collisionObjects = [];

  // Terrain
  const terrain = createTerrain();
  collisionObjects.push(terrain);

  // Water
  createWater();

  // Buildings — colorful, scattered
  const buildingDefs = [
    { x: -30, z: -30, w: 10, d: 8,  h: 6,  color: 0xcc5533, roof: 0x993322 },
    { x:  25, z: -20, w: 8,  d: 8,  h: 8,  color: 0x4466aa, roof: 0x334488 },
    { x:  -10, z:  35, w: 12, d: 10, h: 5,  color: 0xddaa44, roof: 0xaa8833 },
    { x:  40, z:  30, w: 7,  d: 7,  h: 10, color: 0x55aa55, roof: 0x338833 },
    { x: -50, z:  10, w: 9,  d: 9,  h: 7,  color: 0xaa55aa, roof: 0x883388 },
    { x:  10, z: -50, w: 14, d: 8,  h: 4,  color: 0xdd7744, roof: 0xaa5522 }
  ];

  buildingDefs.forEach(b => {
    const wall = createBuilding(b.x, b.z, b.w, b.d, b.h, b.color, b.roof);
    collisionObjects.push(wall);
  });

  // Trees
  for (let i = 0; i < CFG.treeCount; i++) {
    const x = (Math.random() - 0.5) * (S - 20);
    const z = (Math.random() - 0.5) * (S - 20);
    // Don't place inside buildings
    const tooClose = buildingDefs.some(b => Math.abs(x - b.x) < b.w + 3 && Math.abs(z - b.z) < b.d + 3);
    if (!tooClose) {
      const trunk = createTree(x, z, Math.random() > 0.5 ? 'pine' : 'round');
      collisionObjects.push(trunk);
    }
  }

  // Rocks for stone material
  for (let i = 0; i < 15; i++) {
    const x = (Math.random() - 0.5) * (S - 10);
    const z = (Math.random() - 0.5) * (S - 10);
    const y = getTerrainHeight(x, z);
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.8 + Math.random() * 1.2, 1),
      new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9, metalness: 0.1 })
    );
    rock.position.set(x, y + 0.5, z);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.castShadow = true;
    scene.add(rock);
    collisionObjects.push(rock);
  }

  // Fences (low barriers)
  for (let i = 0; i < 8; i++) {
    const x = (Math.random() - 0.5) * (S - 20);
    const z = (Math.random() - 0.5) * (S - 20);
    const y = getTerrainHeight(x, z);
    const fence = new THREE.Mesh(
      new THREE.BoxGeometry(4, 1.2, 0.15),
      new THREE.MeshStandardMaterial({ color: 0x996633, roughness: 0.8 })
    );
    fence.position.set(x, y + 0.6, z);
    fence.rotation.y = Math.random() * Math.PI;
    fence.castShadow = true;
    scene.add(fence);
    collisionObjects.push(fence);
  }

  // Sun visual (stylized)
  const sunVis = new THREE.Mesh(
    new THREE.SphereGeometry(5, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xffee88 })
  );
  sunVis.position.set(50, 80, 30);
  scene.add(sunVis);

  return collisionObjects;
}

// ═══════════════════════════════════════════════════════════════════
// HUMANOID CHARACTER — Articulated limbs with animation
// ═══════════════════════════════════════════════════════════════════

/**
 * Humanoid class — fully articulated character with:
 * - Head (sphere), Torso (box), Arms (upper+forearm), Legs (thigh+shin)
 * - Animation state machine with lerp blending
 * - Weapon attachment point
 */
class Humanoid {
  constructor(teamColor, isAI = false) {
    this.group = new THREE.Group();
    this.teamColor = teamColor;
    this.isAI = isAI;

    // Skin material — toon-style
    const skinCol = 0xf5c5a3;
    const skinMat = new THREE.MeshStandardMaterial({ color: skinCol, roughness: 0.8, metalness: 0.0 });
    const teamMat = new THREE.MeshStandardMaterial({ color: teamColor, roughness: 0.6, metalness: 0.1 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7, metalness: 0.2 });

    // ── TORSO ──────────────────────────────────────
    this.torso = new THREE.Group();
    const torsoMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.0, 0.5), teamMat);
    torsoMesh.castShadow = true;
    this.torso.add(torsoMesh);
    // Shoulder pads
    const padGeo = new THREE.SphereGeometry(0.15, 6, 6);
    const padL = new THREE.Mesh(padGeo, darkMat);
    padL.position.set(-0.55, 0.35, 0);
    this.torso.add(padL);
    const padR = new THREE.Mesh(padGeo, darkMat);
    padR.position.set(0.55, 0.35, 0);
    this.torso.add(padR);
    this.torso.position.y = 1.1;
    this.group.add(this.torso);

    // ── HEAD ───────────────────────────────────────
    this.head = new THREE.Group();
    const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.28, 10, 8), skinMat);
    headMesh.castShadow = true;
    this.head.add(headMesh);
    // Helmet/hat
    const helmet = new THREE.Mesh(
      new THREE.SphereGeometry(0.32, 10, 6, 0, Math.PI * 2, 0, Math.PI / 2),
      teamMat
    );
    helmet.position.y = 0.05;
    this.head.add(helmet);
    // Visor
    const visor = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 0.12), new THREE.MeshBasicMaterial({ color: 0x111111 }));
    visor.position.set(0, -0.05, 0.28);
    this.head.add(visor);
    this.head.position.y = 0.7;
    this.torso.add(this.head);

    // ── LEFT ARM ───────────────────────────────────
    this.armL = new THREE.Group();
    this.upperArmL = new THREE.Group();
    const uArmLM = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.5, 8), teamMat);
    uArmLM.position.y = -0.25;
    uArmLM.castShadow = true;
    this.upperArmL.add(uArmLM);
    this.forearmL = new THREE.Group();
    const fArmLM = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.45, 8), skinMat);
    fArmLM.position.y = -0.22;
    fArmLM.castShadow = true;
    this.forearmL.add(fArmLM);
    this.forearmL.position.y = -0.5;
    this.upperArmL.add(this.forearmL);
    this.upperArmL.position.set(-0.55, 0.3, 0);
    this.torso.add(this.upperArmL);

    // ── RIGHT ARM (weapon arm) ─────────────────────
    this.armR = new THREE.Group();
    this.upperArmR = new THREE.Group();
    const uArmRM = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.5, 8), teamMat);
    uArmRM.position.y = -0.25;
    uArmRM.castShadow = true;
    this.upperArmR.add(uArmRM);
    this.forearmR = new THREE.Group();
    const fArmRM = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.08, 0.45, 8), skinMat);
    fArmRM.position.y = -0.22;
    fArmRM.castShadow = true;
    this.forearmR.add(fArmRM);
    this.forearmR.position.y = -0.5;
    this.upperArmR.add(this.forearmR);
    this.upperArmR.position.set(0.55, 0.3, 0);
    this.torso.add(this.upperArmR);

    // Weapon attach point (right hand)
    this.weaponAttach = new THREE.Group();
    this.weaponAttach.position.y = -0.45;
    this.forearmR.add(this.weaponAttach);

    // ── LEFT LEG ───────────────────────────────────
    this.legL = new THREE.Group();
    this.thighL = new THREE.Group();
    const thighLM = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.11, 0.55, 8), darkMat);
    thighLM.position.y = -0.27;
    thighLM.castShadow = true;
    this.thighL.add(thighLM);
    this.shinL = new THREE.Group();
    const shinLM = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.5, 8), darkMat);
    shinLM.position.y = -0.25;
    shinLM.castShadow = true;
    this.shinL.add(shinLM);
    // Boot
    const bootLM = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.28), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }));
    bootLM.position.set(0, -0.5, 0.04);
    this.shinL.add(bootLM);
    this.shinL.position.y = -0.55;
    this.thighL.add(this.shinL);
    this.thighL.position.set(-0.2, -0.1, 0);
    this.torso.add(this.thighL);

    // ── RIGHT LEG ──────────────────────────────────
    this.legR = new THREE.Group();
    this.thighR = new THREE.Group();
    const thighRM = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.11, 0.55, 8), darkMat);
    thighRM.position.y = -0.27;
    thighRM.castShadow = true;
    this.thighR.add(thighRM);
    this.shinR = new THREE.Group();
    const shinRM = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.5, 8), darkMat);
    shinRM.position.y = -0.25;
    shinRM.castShadow = true;
    this.shinR.add(shinRM);
    const bootRM = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.28), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 }));
    bootRM.position.set(0, -0.5, 0.04);
    this.shinR.add(bootRM);
    this.shinR.position.y = -0.55;
    this.thighR.add(this.shinR);
    this.thighR.position.set(0.2, -0.1, 0);
    this.torso.add(this.thighR);

    // ── Team indicator light ───────────────────────
    this.glow = new THREE.PointLight(teamColor, 0.5, 5);
    this.glow.position.y = 2;
    this.group.add(this.glow);

    scene.add(this.group);

    // ── Animation State ────────────────────────────
    this.animState = animStates.IDLE;
    this.animTime = 0;
    this.animBlend = 0;       // blend factor for transitions
    this.prevPose = null;
    this.recoilTimer = 0;
    this.reloadTimer = 0;
  }

  /** Set the animation state with blending */
  setAnim(state) {
    if (this.animState !== state) {
      this.prevPose = this.getCurrentPose();
      this.animBlend = 0;
      this.animState = state;
    }
  }

  /** Get current limb rotations as a snapshot for blending */
  getCurrentPose() {
    return {
      armL: this.upperArmL.rotation.x,
      armR: this.upperArmR.rotation.x,
      forearmL: this.forearmL.rotation.x,
      forearmR: this.forearmR.rotation.x,
      thighL: this.thighL.rotation.x,
      thighR: this.thighR.rotation.x,
      shinL: this.shinL.rotation.x,
      shinR: this.shinR.rotation.x,
      torsoX: this.torso.rotation.x
    };
  }

  /** Apply a pose snapshot */
  applyPose(pose) {
    this.upperArmL.rotation.x = pose.armL;
    this.upperArmR.rotation.x = pose.armR;
    this.forearmL.rotation.x = pose.forearmL;
    this.forearmR.rotation.x = pose.forearmR;
    this.thighL.rotation.x = pose.thighL;
    this.thighR.rotation.x = pose.thighR;
    this.shinL.rotation.x = pose.shinL;
    this.shinR.rotation.x = pose.shinR;
    this.torso.rotation.x = pose.torsoX;
  }

  /** Lerp between two pose snapshots */
  lerpPose(a, b, t) {
    const r = {};
    for (const k in a) r[k] = a[k] + (b[k] - a[k]) * t;
    return r;
  }

  /** Calculate a target pose for the current animation state */
  getTargetPose(t) {
    const p = {
      armL: 0, armR: 0, forearmL: 0, forearmR: 0,
      thighL: 0, thighR: 0, shinL: 0, shinR: 0, torsoX: 0
    };

    switch (this.animState) {
      case animStates.IDLE:
        p.armL = Math.sin(t * 1.5) * 0.03;
        p.armR = Math.sin(t * 1.5 + 0.5) * 0.03;
        p.forearmL = -0.1;
        p.forearmR = -0.1;
        p.thighL = Math.sin(t * 0.8) * 0.02;
        p.thighR = Math.sin(t * 0.8 + Math.PI) * 0.02;
        break;

      case animStates.RUN:
        p.armL = Math.sin(t * 8) * 0.6;
        p.armR = Math.sin(t * 8 + Math.PI) * 0.6;
        p.forearmL = -0.3 - Math.abs(Math.sin(t * 8)) * 0.4;
        p.forearmR = -0.3 - Math.abs(Math.sin(t * 8 + Math.PI)) * 0.4;
        p.thighL = Math.sin(t * 8) * 0.7;
        p.thighR = Math.sin(t * 8 + Math.PI) * 0.7;
        p.shinL = Math.max(0, -Math.sin(t * 8)) * 1.0;
        p.shinR = Math.max(0, -Math.sin(t * 8 + Math.PI)) * 1.0;
        p.torsoX = 0.08;
        break;

      case animStates.JUMP:
        p.armL = -0.5;
        p.armR = -0.5;
        p.forearmL = -0.3;
        p.forearmR = -0.3;
        p.thighL = -0.3;
        p.thighR = -0.3;
        p.shinL = 0.6;
        p.shinR = 0.6;
        break;

      case animStates.ADS:
        p.armR = -1.3;
        p.forearmR = -0.6;
        p.armL = -0.3;
        p.forearmL = -0.5;
        p.torsoX = 0.12;
        break;

      case animStates.SHOOT:
        p.armR = -1.3 + Math.sin(t * 30) * 0.15;
        p.forearmR = -0.6;
        p.armL = -0.3;
        p.forearmL = -0.5;
        p.torsoX = 0.12;
        break;

      case animStates.RELOAD:
        p.armR = -0.6 + Math.sin(t * 4) * 0.3;
        p.armL = -0.8 + Math.sin(t * 4 + 1) * 0.3;
        p.forearmR = -1.2;
        p.forearmL = -1.0;
        p.torsoX = 0.15;
        break;

      case animStates.GLIDE:
        p.armL = -1.5;
        p.armR = -1.5;
        p.forearmL = 0.2;
        p.forearmR = 0.2;
        p.thighL = 0.1;
        p.thighR = 0.1;
        p.shinL = 0.3;
        p.shinR = 0.3;
        break;

      case animStates.EMOTE:
        p.armL = Math.sin(t * 6) * 1.2;
        p.armR = Math.sin(t * 6 + Math.PI) * 1.2;
        p.forearmL = -0.5 + Math.sin(t * 6) * 0.5;
        p.forearmR = -0.5 + Math.sin(t * 6 + Math.PI) * 0.5;
        p.thighL = Math.sin(t * 6) * 0.3;
        p.thighR = Math.sin(t * 6 + Math.PI) * 0.3;
        break;
    }
    return p;
  }

  /** Update animation each frame */
  updateAnim(dt) {
    this.animTime += dt;
    this.animBlend = Math.min(1, this.animBlend + dt * 5); // 0.2s blend

    const target = this.getTargetPose(this.animTime);

    if (this.prevPose && this.animBlend < 1) {
      const blended = this.lerpPose(this.prevPose, target, this.animBlend);
      this.applyPose(blended);
    } else {
      this.applyPose(target);
    }

    // Recoil decay
    if (this.recoilTimer > 0) {
      this.recoilTimer -= dt;
      if (this.recoilTimer <= 0 && this.animState === animStates.SHOOT) {
        this.setAnim(isADS ? animStates.ADS : animStates.IDLE);
      }
    }
    // Reload decay
    if (this.reloadTimer > 0) {
      this.reloadTimer -= dt;
      if (this.reloadTimer <= 0 && this.animState === animStates.RELOAD) {
        this.setAnim(animStates.IDLE);
      }
    }
  }

  /** Trigger shoot recoil */
  triggerRecoil() {
    this.recoilTimer = 0.12;
    this.setAnim(animStates.SHOOT);
  }

  /** Trigger reload animation */
  triggerReloadAnim(duration) {
    this.reloadTimer = duration / 1000;
    this.setAnim(animStates.RELOAD);
  }
}
